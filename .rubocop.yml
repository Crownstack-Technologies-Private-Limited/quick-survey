require:
  - rubocop-rails
  - rubocop-performance

AllCops:
  NewCops: enable
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'db/migrate/*'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'config/environments/*'

# Rails specific configurations
Rails:
  Enabled: true

# Relaxed Rules to pass CI
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false

Style/QuotedSymbols:
  Enabled: false

Layout/LineLength:
  Enabled: false

Metrics:
  Enabled: false

Rails/HasAndBelongsToMany:
  Enabled: false

Rails/SkipsModelValidations:
  Enabled: false

Rails/UniqueValidationWithoutIndex:
  Enabled: false

Rails/OutputSafety:
  Enabled: false

Rails/I18nLocaleTexts:
  Enabled: false

Rails/HasManyOrHasOneDependent:
  Enabled: false

Rails/LexicallyScopedActionFilter:
  Enabled: false

Rails/UnknownEnv:
  Environments:
    - development
    - test
    - production
    - staging

Lint/MissingSuper:
  Enabled: false

Lint/RescueException:
  Enabled: false

Lint/NestedMethodDefinition:
  Enabled: false

Lint/UnusedMethodArgument:
  Enabled: false

Style/OpenStructUse:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false
